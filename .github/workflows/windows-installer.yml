name: Windows Portable

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build Windows portable
        run: |
          npm run build:localize
          npm run build:electron
          npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: release/

      # electron-updater on Windows fetches `latest.yml` from the latest
      # release on this repo to detect updates. Without that file the
      # in-app "Check Updates" button shows "Update error" forever.
      # Also include the .blockmap so future delta updates have the
      # signature data they need.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ github.token }}
