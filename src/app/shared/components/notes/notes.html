<div class="flex flex-col gap-2 h-full">
  <p-scrollPanel [style]="{ width: '100%', height: '200px' }">
    <div class="flex flex-col gap-2 p-1">
      @if (notes().length === 0) {
        <div class="text-center text-muted-color p-4">No notes yet.</div>
      }
      @for (note of notes(); track note.id) {
        <div
          class="p-3bg-surface-0 dark:bg-surface-900 flex justify-between items-start group"
        >
          <div class="flex flex-col gap-1">
            <span class="break-words">{{ note.content }}</span>
            <span class="text-xs text-muted-color">{{ note.created_at | date: 'medium' }}</span>
          </div>
          <p-button
            icon="pi pi-times"
            [text]="true"
            severity="danger"
            size="small"
            (onClick)="deleteNote(note.id)"
            styleClass="opacity-0 group-hover:opacity-100 transition-opacity"
          />
        </div>
      }
    </div>
  </p-scrollPanel>
  <div class="flex gap-2">
    <input
      pInputText
      [(ngModel)]="newNoteContent"
      (keydown.enter)="addNote()"
      placeholder="Add a note... (Press Enter)"
      class="flex-1 w-full"
    />
  </div>
</div>
