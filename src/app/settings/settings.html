<div class="card p-6 flex flex-col gap-4">
    <h2 class="text-2xl font-bold">Settings</h2>
    
    <div class="flex flex-col gap-4 p-4 border rounded-xl border-surface-200 dark:border-surface-700 bg-surface-50 dark:bg-surface-950">
        <div class="flex flex-col">
            <span class="text-xl font-semibold text-red-600 dark:text-red-400">Danger Zone</span>
            <span class="text-muted-color">Manage database and data state. These actions cannot be undone.</span>
        </div>
        
        <div class="flex gap-4">
            <p-button 
                label="Reset Database" 
                icon="pi pi-trash" 
                severity="danger" 
                (onClick)="resetDatabase()" 
                [loading]="loading"
            />
            
            <p-button 
                label="Seed Mock Data" 
                icon="pi pi-database" 
                severity="warn" 
                (onClick)="seedDatabase()" 
                [loading]="loading"
            />
        </div>
    </div>
</div>
<p-confirmDialog />
<p-toast />
