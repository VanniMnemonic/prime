<div class="card overflow-x-auto p-4">
  @if (!loading() && data().length === 0) {
    <div class="flex flex-col items-center justify-center min-h-[60vh] gap-4">
      <p-button
        icon="pi pi-plus"
        label="Add Location"
        i18n-label="@@addLocationButton"
        [rounded]="true"
        (onClick)="addRootLocation()"
      />
    </div>
  } @else {
    <p-organizationChart [value]="data()" [collapsible]="true">
      <ng-template let-node pTemplate="default">
        <div class="p-2 text-center min-w-32 flex flex-col gap-1 relative group">
          <div class="font-bold">{{ node.data.denomination }}</div>
          @if (node.data.description) {
            <div class="text-sm opacity-80">{{ node.data.description }}</div>
          }
          @if (node.data.phone) {
            <div class="text-xs opacity-70 flex items-center justify-center gap-1">
              <i class="pi pi-phone text-xs"></i>
              {{ node.data.phone }}
            </div>
          }
          <div class="absolute -top-2 -right-3">
            <p-button
              icon="pi pi-plus"
              [rounded]="true"
              [text]="true"
              size="small"
              severity="secondary"
              pTooltip="Add sub-location"
              (onClick)="addSubLocation(node.data)"
              [style]="{ width: '1.5rem', height: '1.5rem', padding: '0' }"
            />
          </div>
        </div>
      </ng-template>
    </p-organizationChart>
  }
</div>

<p-dialog
  [visible]="drawerVisible()"
  (visibleChange)="drawerVisible.set($event)"
  [header]="
    selectedLocation()
      ? 'Add Sub-Location to ' + selectedLocation().denomination
      : 'Add Root Location'
  "
  [modal]="true"
  [dismissableMask]="true"
  appendTo="body"
  [style]="{ width: '30rem' }"
  [breakpoints]="{ '960px': '75vw', '640px': '90vw' }"
>
  <ng-template pTemplate="content">
    @if (drawerVisible()) {
      <app-location-form
        [parentLocation]="selectedLocation()"
        (onSave)="onLocationSaved()"
        (onCancel)="drawerVisible.set(false)"
      />
    }
  </ng-template>
</p-dialog>
